<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk — Nexify</title>
  <meta name="description" content="Masuk ke akun Nexify Anda atau buat akun baru.">

  <!-- Open Graph / Social Meta -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nexify.io/login">
  <meta property="og:title" content="Masuk — Nexify">
  <meta property="og:description" content="Masuk ke akun Nexify Anda atau buat akun baru.">
  <meta property="og:image" content="assets/images/og-image.svg">
  <meta property="og:locale" content="id_ID">
  <meta property="og:site_name" content="Nexify">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@nexify">
  <meta name="twitter:title" content="Masuk — Nexify">
  <meta name="twitter:description" content="Masuk ke akun Nexify Anda atau buat akun baru.">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://nexify.io/login">

  <!-- Sitemap hint -->
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">

  <!-- Robots -->
  <meta name="robots" content="index, follow">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- ======= SIMPLIFIED NAVBAR ======= -->
  <nav class="navbar" id="navbar" aria-label="Navigasi utama">
    <div class="container">
      <a href="./" class="nav-logo">
        <div class="nav-logo-icon">
          <i class="fa-solid fa-bolt"></i>
        </div>
        <span>Nexify</span>
      </a>
      <a href="./" class="nav-back-link">
        <i class="fa-solid fa-arrow-left"></i> Kembali ke Beranda
      </a>
    </div>
  </nav>

  <!-- ======= AUTH FORM ======= -->
  <main class="auth-page">
    <div class="auth-card">

      <div class="auth-header">
        <a href="./" class="nav-logo">
          <div class="nav-logo-icon">
            <i class="fa-solid fa-bolt"></i>
          </div>
          <span>Nexify</span>
        </a>
        <h1>Selamat Datang Kembali</h1>
        <p>Masuk ke akun Anda atau buat akun baru</p>
      </div>

      <!-- Tab toggle -->
      <div class="auth-tab-group">
        <button type="button" id="tabLogin" class="auth-tab active">Masuk</button>
        <button type="button" id="tabRegister" class="auth-tab">Daftar</button>
      </div>

      <!-- Sign In Form -->
      <form class="auth-form auth-form--visible" id="loginForm" action="#" method="post" novalidate>
        <div class="form-group">
          <label for="email">Alamat email</label>
          <input type="email" id="email" placeholder="anda@perusahaan.com" required autocomplete="email">
          <span class="form__error" id="emailError"></span>
        </div>
        <div class="form-group">
          <label for="password">Kata Sandi</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="8" autocomplete="current-password">
          <span class="form__error" id="passwordError"></span>
        </div>
        <div class="form-options">
          <label>
            <input type="checkbox" checked> Ingat saya
          </label>
          <a href="#">Lupa kata sandi?</a>
        </div>
        <button type="submit" class="btn-primary">
          Masuk
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <!-- Register Form (hidden by default) -->
      <form class="auth-form auth-form--hidden" id="registerForm" action="#" method="post" novalidate>
        <div class="form-group">
          <label for="regName">Nama lengkap</label>
          <input type="text" id="regName" placeholder="Nama Anda" required autocomplete="name">
          <span class="form__error" id="regNameError"></span>
        </div>
        <div class="form-group">
          <label for="regEmail">Alamat email</label>
          <input type="email" id="regEmail" placeholder="anda@perusahaan.com" required autocomplete="email">
          <span class="form__error" id="regEmailError"></span>
        </div>
        <div class="form-group">
          <label for="regPassword">Kata Sandi</label>
          <input type="password" id="regPassword" placeholder="Buat kata sandi" required minlength="8" autocomplete="new-password">
          <span class="form__error" id="regPasswordError"></span>
        </div>
        <div class="form-options">
          <label>
            <input type="checkbox" required> Saya setuju dengan <a href="#" class="inline-accent-link inline-ml-4">Syarat Layanan</a>
          </label>
        </div>
        <button type="submit" class="btn-primary">
          Buat Akun
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>atau lanjutkan dengan</span>
      </div>

      <!-- Social login -->
      <div class="auth-social">
        <button type="button" aria-label="Masuk dengan Google">
          <i class="fa-brands fa-google"></i> Google
        </button>
        <button type="button" aria-label="Masuk dengan GitHub">
          <i class="fa-brands fa-github"></i> GitHub
        </button>
      </div>

      <p class="auth-footer-text" id="authFooter">
        Belum punya akun? <a href="#" id="switchToRegister">Buat akun</a>
      </p>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      /* ======= TAB TOGGLE ======= */
      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const switchToRegister = document.getElementById('switchToRegister');
      const authFooter = document.getElementById('authFooter');

      function setActiveTab(tab) {
        [tabLogin, tabRegister].forEach(t => {
          t.classList.toggle('active', t === tab);
        });
      }

      function showLoginForm() {
        loginForm.classList.remove('auth-form--hidden');
        loginForm.classList.add('auth-form--visible');
        registerForm.classList.remove('auth-form--visible');
        registerForm.classList.add('auth-form--hidden');
        authFooter.innerHTML = 'Belum punya akun? <a href="#" id="switchToRegister">Buat akun</a>';
        setActiveTab(tabLogin);
        document.getElementById('switchToRegister').addEventListener('click', function (e) {
          e.preventDefault();
          tabRegister.click();
        });
      }

      function showRegisterForm() {
        registerForm.classList.remove('auth-form--hidden');
        registerForm.classList.add('auth-form--visible');
        loginForm.classList.remove('auth-form--visible');
        loginForm.classList.add('auth-form--hidden');
        authFooter.innerHTML = 'Sudah punya akun? <a href="#" id="switchToLogin">Masuk</a>';
        setActiveTab(tabRegister);
        document.getElementById('switchToLogin').addEventListener('click', function (e) {
          e.preventDefault();
          tabLogin.click();
        });
      }

      tabLogin.addEventListener('click', showLoginForm);
      tabRegister.addEventListener('click', showRegisterForm);

      switchToRegister.addEventListener('click', function (e) {
        e.preventDefault();
        tabRegister.click();
      });

      /* ======= REAL-TIME FORM VALIDATION ======= */
      function setFieldError(input, errorEl, message) {
        input.classList.add('error');
        errorEl.textContent = message;
      }

      function clearFieldError(input, errorEl) {
        input.classList.remove('error');
        errorEl.textContent = '';
      }

      function validateEmail(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value.trim());
      }

      function clearOnInput(input, errorEl) {
        input.addEventListener('input', function () {
          if (this.classList.contains('error')) {
            errorEl.textContent = '';
            this.classList.remove('error');
          }
        });
      }

      // --- Login form validation ---
      const loginEmail = document.getElementById('email');
      const loginPass = document.getElementById('password');
      const loginEmailErr = document.getElementById('emailError');
      const loginPassErr = document.getElementById('passwordError');

      function validateLoginForm() {
        let valid = true;
        const email = loginEmail.value.trim();
        const pass = loginPass.value;

        if (!email) {
          setFieldError(loginEmail, loginEmailErr, 'Email wajib diisi.');
          valid = false;
        } else if (!validateEmail(email)) {
          setFieldError(loginEmail, loginEmailErr, 'Masukkan alamat email yang valid.');
          valid = false;
        } else {
          clearFieldError(loginEmail, loginEmailErr);
        }

        if (!pass) {
          setFieldError(loginPass, loginPassErr, 'Kata sandi wajib diisi.');
          valid = false;
        } else if (pass.length < 8) {
          setFieldError(loginPass, loginPassErr, 'Kata sandi minimal 8 karakter.');
          valid = false;
        } else {
          clearFieldError(loginPass, loginPassErr);
        }

        return valid;
      }

      clearOnInput(loginEmail, loginEmailErr);
      clearOnInput(loginPass, loginPassErr);

      loginEmail.addEventListener('blur', function () {
        if (this.value.trim()) validateLoginForm();
      });
      loginPass.addEventListener('blur', function () {
        if (this.value) validateLoginForm();
      });

      loginForm.addEventListener('submit', function (e) {
        e.preventDefault();
        if (validateLoginForm()) {
          // Simulate success
          loginEmail.value = '';
          loginPass.value = '';
          clearFieldError(loginEmail, loginEmailErr);
          clearFieldError(loginPass, loginPassErr);
          loginEmail.placeholder = 'Cek email Anda untuk konfirmasi!';
          setTimeout(function () {
            loginEmail.placeholder = 'anda@perusahaan.com';
          }, 3000);
        }
      });

      // --- Register form validation ---
      const regName = document.getElementById('regName');
      const regEmail = document.getElementById('regEmail');
      const regPass = document.getElementById('regPassword');
      const regNameErr = document.getElementById('regNameError');
      const regEmailErr = document.getElementById('regEmailError');
      const regPassErr = document.getElementById('regPasswordError');

      function validateRegisterForm() {
        let valid = true;
        const name = regName.value.trim();
        const email = regEmail.value.trim();
        const pass = regPass.value;

        if (!name) {
          setFieldError(regName, regNameErr, 'Nama lengkap wajib diisi.');
          valid = false;
        } else if (name.length < 2) {
          setFieldError(regName, regNameErr, 'Nama minimal 2 karakter.');
          valid = false;
        } else {
          clearFieldError(regName, regNameErr);
        }

        if (!email) {
          setFieldError(regEmail, regEmailErr, 'Email wajib diisi.');
          valid = false;
        } else if (!validateEmail(email)) {
          setFieldError(regEmail, regEmailErr, 'Masukkan alamat email yang valid.');
          valid = false;
        } else {
          clearFieldError(regEmail, regEmailErr);
        }

        if (!pass) {
          setFieldError(regPass, regPassErr, 'Kata sandi wajib diisi.');
          valid = false;
        } else if (pass.length < 8) {
          setFieldError(regPass, regPassErr, 'Kata sandi minimal 8 karakter.');
          valid = false;
        } else {
          clearFieldError(regPass, regPassErr);
        }

        return valid;
      }

      clearOnInput(regName, regNameErr);
      clearOnInput(regEmail, regEmailErr);
      clearOnInput(regPass, regPassErr);

      regName.addEventListener('blur', function () {
        if (this.value.trim()) validateRegisterForm();
      });
      regEmail.addEventListener('blur', function () {
        if (this.value.trim()) validateRegisterForm();
      });
      regPass.addEventListener('blur', function () {
        if (this.value) validateRegisterForm();
      });

      registerForm.addEventListener('submit', function (e) {
        e.preventDefault();
        if (validateRegisterForm()) {
          regName.value = '';
          regEmail.value = '';
          regPass.value = '';
          [regName, regEmail, regPass].forEach(function (el) {
            el.classList.remove('error');
          });
          [regNameErr, regEmailErr, regPassErr].forEach(function (el) {
            el.textContent = '';
          });
          showLoginForm();
        }
      });

      /* ======= NAVBAR SCROLL (debounced) ======= */
      const navbar = document.getElementById('navbar');
      let scrollTicking = false;

      window.addEventListener('scroll', function () {
        if (!scrollTicking) {
          window.requestAnimationFrame(function () {
            navbar.classList.toggle('scrolled', window.scrollY > 40);
            scrollTicking = false;
          });
          scrollTicking = true;
        }
      }, { passive: true });
    });
  </script>
</body>
</html>
